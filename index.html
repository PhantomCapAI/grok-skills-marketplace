<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillForge ⚡ Grok & Claude Skills</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .skill-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .skill-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 dark:bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-10">
      <div>
        <h1 class="text-5xl font-bold flex items-center gap-3">
          ⚡ <span class="bg-gradient-to-r from-violet-400 to-fuchsia-500 bg-clip-text text-transparent">SkillForge</span>
        </h1>
        <p class="text-xl text-zinc-400 mt-2">Grok & Claude Skills Marketplace</p>
        <p class="text-sm text-zinc-500">by <a href="https://x.com/PhantomCap_ai" target="_blank" class="hover:text-white">@PhantomCap_ai</a></p>
      </div>
      
      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" id="themeToggle"
                class="w-11 h-11 flex items-center justify-center rounded-2xl bg-zinc-900 hover:bg-zinc-800 transition">
          <i class="fa-solid fa-sun text-xl"></i>
        </button>
        
        <!-- Favorites -->
        <button onclick="showFavorites()" class="w-11 h-11 flex items-center justify-center rounded-2xl bg-zinc-900 hover:bg-zinc-800 transition relative">
          <i class="fa-solid fa-heart text-xl"></i>
          <span id="favCount" class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>

        <button onclick="showUploadModal()" 
                class="bg-white text-black px-6 py-3 rounded-2xl font-semibold flex items-center gap-2 hover:bg-zinc-200 transition">
          <i class="fa-solid fa-upload"></i> Upload Skill
        </button>
      </div>
    </div>

    <!-- Search & Filters -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <div class="flex-1 relative">
        <input id="searchInput" 
               type="text" 
               placeholder="Search skills..." 
               onkeyup="filterSkills()"
               class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-violet-500">
      </div>
      <select id="categoryFilter" onchange="filterSkills()" 
              class="bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-4">
        <option value="">All Categories</option>
        <option value="finance">Finance</option>
        <option value="research">Research</option>
        <option value="coding">Coding</option>
        <option value="social">Social</option>
        <option value="creative">Creative</option>
        <option value="productivity">Productivity</option>
      </select>
    </div>

    <!-- Skills Grid -->
    <div id="skillsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Skill Preview Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-lg w-full overflow-hidden">
      <div class="p-8">
        <div class="flex justify-between items-start mb-6">
          <div id="modalIcon" class="text-6xl"></div>
          <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-3xl leading-none">✕</button>
        </div>
        <h2 id="modalTitle" class="text-3xl font-bold mb-2"></h2>
        <p id="modalAuthor" class="text-violet-400"></p>
        <p id="modalDesc" class="text-zinc-300 mt-6 leading-relaxed"></p>
        
        <div class="mt-8 bg-zinc-950 rounded-2xl p-6">
          <h3 class="font-semibold mb-3 flex items-center gap-2"><i class="fa-solid fa-download"></i> Install Instructions</h3>
          <pre id="modalInstall" class="text-sm text-emerald-400 font-mono overflow-auto max-h-48 whitespace-pre-wrap"></pre>
        </div>
      </div>
      <div class="border-t border-zinc-800 p-6 flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">Close</button>
        <button onclick="copyInstall()" class="flex-1 py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-semibold">Copy Install</button>
      </div>
    </div>
  </div>

  <script>
    let favorites = JSON.parse(localStorage.getItem('skillFavorites')) || [];

    const skills = [
      { id: 0, title: "Phantom Finance Analyzer", author: "@PhantomCap_ai", category: "finance", icon: "📊", desc: "Deep financial statement analysis, ratio calculation, valuation models, and investment thesis generation.", install: "mkdir -p ~/.grok/skills/phantom-finance-analyzer\ncd ~/.grok/skills/phantom-finance-analyzer" },
      { id: 1, title: "Research Beast", author: "@PhantomCap_ai", category: "research", icon: "🔍", desc: "Multi-source web research, source verification, and structured report generation.", install: "mkdir -p ~/.grok/skills/research-beast" },
      { id: 2, title: "Code Architect", author: "Community", category: "coding", icon: "💾", desc: "System design, architecture diagrams, and production-ready code scaffolding.", install: "mkdir -p ~/.grok/skills/code-architect" },
      { id: 3, title: "Twitter Sentiment Trader", author: "@PhantomCap_ai", category: "social", icon: "🐦", desc: "Real-time X sentiment analysis and trading signal generation.", install: "mkdir -p ~/.grok/skills/twitter-sentiment" },
      { id: 4, title: "Prompt Engineer Pro", author: "@PhantomCap_ai", category: "productivity", icon: "✍️", desc: "Advanced prompt optimization, chain-of-thought templates, and meta-prompting.", install: "mkdir -p ~/.grok/skills/prompt-engineer" },
      { id: 5, title: "Crypto Whale Tracker", author: "Community", category: "finance", icon: "🐳", desc: "Monitor large wallet movements and on-chain intelligence.", install: "mkdir -p ~/.grok/skills/crypto-whale" },
      { id: 6, title: "Legal Document Analyzer", author: "@PhantomCap_ai", category: "research", icon: "⚖️", desc: "Contract review, risk identification, and clause explanations.", install: "mkdir -p ~/.grok/skills/legal-analyzer" },
      { id: 7, title: "YouTube Script Writer", author: "Community", category: "creative", icon: "🎥", desc: "Viral script generation, SEO titles, and thumbnail ideas.", install: "mkdir -p ~/.grok/skills/youtube-writer" },
      { id: 8, title: "Image Prompt Master", author: "@PhantomCap_ai", category: "creative", icon: "🖼️", desc: "Midjourney / Flux / DALL-E ultra-detailed prompt crafting.", install: "mkdir -p ~/.grok/skills/image-prompt" },
      { id: 9, title: "News Summarizer", author: "Community", category: "research", icon: "📰", desc: "Multi-source news digestion with bias detection.", install: "mkdir -p ~/.grok/skills/news-summarizer" },
      { id: 10, title: "Meme Lord Generator", author: "@PhantomCap_ai", category: "creative", icon: "😂", desc: "Create viral memes with current events and humor.", install: "mkdir -p ~/.grok/skills/meme-lord" },
      { id: 11, title: "Fitness Coach AI", author: "Community", category: "productivity", icon: "🏋️", desc: "Personalized workout plans, nutrition, and progress tracking.", install: "mkdir -p ~/.grok/skills/fitness-coach" }
    ];

    function isFavorite(id) { return favorites.includes(id); }

    function toggleFavorite(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('skillFavorites', JSON.stringify(favorites));
      renderSkills(skills);
      updateFavCount();
    }

    function updateFavCount() {
      document.getElementById('favCount').textContent = favorites.length;
    }

    function showFavorites() {
      const favSkills = skills.filter(s => favorites.includes(s.id));
      if (favSkills.length === 0) {
        alert("No favorites yet ❤️\nStart adding some!");
        return;
      }
      renderSkills(favSkills);
    }

    function renderSkills(filteredSkills) {
      const grid = document.getElementById('skillsGrid');
      grid.innerHTML = '';
      filteredSkills.forEach(skill => {
        const isFav = isFavorite(skill.id);
        const card = document.createElement('div');
        card.className = `skill-card bg-zinc-900 border border-zinc-800 rounded-3xl p-8 cursor-pointer relative`;
        card.innerHTML = `
          <button onclick="event.stopImmediatePropagation(); toggleFavorite(${skill.id});" class="absolute top-6 right-6 text-2xl ${isFav ? 'text-red-500' : 'text-zinc-600 hover:text-zinc-400'}">
            <i class="fa-solid fa-heart"></i>
          </button>
          <div class="text-6xl mb-6">${skill.icon}</div>
          <h3 class="text-2xl font-semibold">${skill.title}</h3>
          <p class="text-zinc-400 text-sm mt-1">${skill.author}</p>
          <p class="text-zinc-300 mt-6 line-clamp-3">${skill.desc}</p>
          <div class="mt-8 flex justify-between items-center">
            <span class="text-xs uppercase tracking-widest bg-zinc-800 px-3 py-1 rounded-full">${skill.category}</span>
            <button onclick="event.stopImmediatePropagation(); showSkill(${skill.id})" class="text-violet-400 hover:text-violet-300 text-sm font-medium">Preview →</button>
          </div>
        `;
        card.onclick = () => showSkill(skill.id);
        grid.appendChild(card);
      });
    }

    function filterSkills() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      
      const filtered = skills.filter(skill => {
        const matchesSearch = skill.title.toLowerCase().includes(search) || skill.desc.toLowerCase().includes(search);
        const matchesCategory = !category || skill.category === category;
        return matchesSearch && matchesCategory;
      });
      renderSkills(filtered);
    }

    let currentSkillIndex = 0;
    function showSkill(id) {
      currentSkillIndex = skills.findIndex(s => s.id === id);
      const skill = skills[currentSkillIndex];
      
      document.getElementById('modalTitle').textContent = skill.title;
      document.getElementById('modalAuthor').textContent = skill.author;
      document.getElementById('modalDesc').textContent = skill.desc;
      document.getElementById('modalIcon').textContent = skill.icon;
      document.getElementById('modalInstall').textContent = skill.install;
      
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function copyInstall() {
      const text = skills[currentSkillIndex].install;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ Copied to clipboard!");
      });
    }

    function showUploadModal() {
      alert("🚀 Upload flow coming soon!\n\nFor now: Create a folder in ~/.grok/skills/ and submit a PR on GitHub.");
    }

    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('themeToggle').querySelector('i');
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.theme = 'dark';
      }
    }

    // Load saved theme
    if (localStorage.theme === 'light') {
      document.documentElement.classList.remove('dark');
      document.getElementById('themeToggle').querySelector('i').classList.replace('fa-sun', 'fa-moon');
    }

    // Initial render
    renderSkills(skills);
    updateFavCount();
  </script>
</body>
</html>
